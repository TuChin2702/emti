<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Anh xin một cơ hội</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Quicksand',sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ffe9f3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
overflow:hidden;
}

h1{
color:#ff4d88;
font-size:30px;
margin-bottom:25px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:25px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

.yes{
background:#ff4d88;
color:white;
}

.no{
background:#ddd;
font-size:20px;
position:relative;
}

.sticker{
font-size:45px;
margin-bottom:10px;
}

.heart{
position:absolute;
font-size:25px;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);opacity:1;}
100%{transform:translateY(100vh);opacity:0;}
}

</style>
</head>

<body>

<div class="sticker">🥺❤️✨</div>

<h1>Em đồng ý cho anh một cơ hội nhé ❤️</h1>

<button class="yes" onclick="accept()">Đồng ý</button>
<button class="no" id="noBtn" onclick="changeNo()">Không</button>

<!-- NHẠC: CHỈ CHẠY KHI BẤM ĐỒNG Ý -->
<audio id="music" loop preload="auto">
<source src="nhac-chuong-mot-doi-buitruonglinh.mp3" type="audio/mpeg">
</audio>

<script>

let noTexts = [
"Không",
"Em chắc chưa 🥺",
"Suy nghĩ lại đi mà 😭",
"Anh buồn đó 💔",
"Đừng bấm nữa 😢",
"Thôi mà đồng ý đi ❤️",
"Đồng ý đi cho cục kẹo nè 🍭"  
];

let index = 0;
let noSize = 20;

function changeNo(){

let btn = document.getElementById("noBtn");

index = (index + 1) % noTexts.length;

btn.innerText = noTexts[index];

noSize += 6;
btn.style.fontSize = noSize + "px";

// cho nút chạy trốn nhẹ nhẹ
btn.style.position = "absolute";
btn.style.left = Math.random() * 70 + "vw";
btn.style.top = Math.random() * 70 + "vh";
}

function accept(){

let music = document.getElementById("music");

// reset & play nhạc khi bấm đồng ý
music.currentTime = 0;
music.play().catch(() => {});

// đổi giao diện
document.body.innerHTML = `
<h1>Anh biết mà 😆❤️</h1>
<h2>Cảm ơn em đã cho anh cơ hội 💕</h2>
`;

// hiệu ứng tim
for(let i = 0; i < 60; i++){
createHeart();
}

}

let heart = document.createElement("div");
heart
