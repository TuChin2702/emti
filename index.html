<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cho anh một cơ hội nha</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Quicksand',sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#ffd6e7,#ffe9f2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

h1{
    font-size:30px;
    color:#ff4d88;
}

button{
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

.yes{
    background:#ff4d88;
    color:white;
}

.no{
    background:#ddd;
    font-size:22px;
}

.sticker{
    font-size:40px;
}
</style>
</head>

<body>

<div class="sticker">🥺❤️✨</div>

<h1>Em đồng ý cho anh một cơ hội nhé ❤️</h1>

<button class="yes" onclick="accept()">Đồng ý</button>
<button class="no" onclick="changeNo()">Không</button>

<audio id="music" loop>
<source src="nhac-chuong-mot-doi-buitruonglinh.mp3" type="audio/mpeg">
</audio>

<script>

function accept(){
document.getElementById("music").play();
alert("Anh biết mà 😆❤️");
}

let noTexts=[
"Không",
"Em chắc chưa 😢",
"Suy nghĩ lại đi mà 🥺",
"Anh buồn đó 💔",
"Đừng bấm nữa 😭",
"Thôi mà đồng ý đi ❤️"
];

let index=0;

function changeNo(){
let btn=document.querySelector(".no");
index++;
if(index>=noTexts.length){
index=0;
}
btn.innerText=noTexts[index];
}

</script>

</body>
</html>
