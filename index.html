<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cho anh một cơ hội nha 🥺</title>

<style>

body{
    background: linear-gradient(135deg,#ffd6e7,#ffe9f3);
    font-family: "Comic Sans MS", cursive;
    text-align:center;
    padding-top:120px;
    overflow:hidden;
}

h1{
    color:#ff4d88;
    font-size:32px;
}

p{
    color:#ff6fa5;
    font-size:18px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    margin:10px;
}

#yes{
    background:#ff6fa5;
    color:white;
}

#no{
    background:#ffc0cb;
    position:absolute;
}

/* sticker */

.sticker{
    position:absolute;
    font-size:30px;
    animation: float 5s infinite ease-in-out;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
    100%{transform:translateY(0);}
}

</style>

</head>

<body>

<h1>🥺 Em đồng ý cho anh cơ hội nhé?</h1>

<button id="yes" onclick="yes()">Đồng ý 💖</button>
<button id="no" onmouseover="move()">Không 😶</button>

<p>Thoát app hoặc không chọn = Đồng ýyy 😌</p>

<!-- sticker -->
<div class="sticker" style="top:10%;left:10%">❤️</div>
<div class="sticker" style="top:20%;right:15%">🐻</div>
<div class="sticker" style="bottom:15%;left:20%">✨</div>
<div class="sticker" style="bottom:10%;right:10%">💞</div>

<script>

function yes(){
    <script>

let texts = [
"Không",
"Anh thử lại đi 😝",
"Thật luôn hả",
"Bấm lại xem",
"Em suy nghĩ kỹ chưa",
"Thôi đồng ý đi mà 😭"
];

let i = 0;
let size = 18;

function changeNo(){

i++;
size += 8;

let noBtn = document.getElementById("noBtn");

if(i < texts.length){
noBtn.innerText = texts[i];
}else{
noBtn.innerText = "Đồng ý đi nha ❤️";
}

noBtn.style.fontSize = size + "px";
noBtn.style.padding = (size/2) + "px " + size + "px";

}

</script>


function move(){
    var x = Math.random() * window.innerWidth;
    var y = Math.random() * window.innerHeight;

    document.getElementById("no").style.left = x + "px";
    document.getElementById("no").style.top = y + "px";
}

</script>

</body>
</html>
