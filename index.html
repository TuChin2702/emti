<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Anh xin một cơ hội</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Quicksand',sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ffe9f3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
overflow:hidden;
}

h1{
color:#ff4d88;
font-size:30px;
margin-bottom:30px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:25px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

.yes{
background:#ff4d88;
color:white;
}

.no{
background:#ddd;
font-size:20px;
}

.sticker{
font-size:45px;
margin-bottom:10px;
}

.heart{
position:absolute;
font-size:25px;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="sticker">🥺❤️✨</div>

<h1>Em đồng ý cho anh một cơ hội nhé ❤️</h1>

<button class="yes" onclick="accept()">Đồng ý</button>
<button class="no" onclick="changeNo()">Không</button>

<audio id="music" loop>
<source src="nhac-chuong-mot-doi-buitruonglinh.mp3" type="audio/mpeg">
</audio>

<script>

let noSize=20;

let noTexts=[
"Không",
"Em chắc chưa 🥺",
"Suy nghĩ lại đi mà 😭",
"Anh buồn đó 💔",
"Đừng bấm nữa 😢",
"Thôi mà đồng ý đi ❤️",
"Đồng ý đi cho cục kẹo nè 🍭"     
];

let index=0;

function changeNo(){

let btn=document.querySelector(".no");

index++;
if(index>=noTexts.length){
index=0;
}

btn.innerText=noTexts[index];

noSize+=8;
btn.style.fontSize=noSize+"px";

}

function accept(){

document.getElementById("music").play();

document.body.innerHTML="<h1>Anh biết mà 😆❤️</h1><h2>Cảm ơn em đã cho anh cơ hội 💕</h2>";

for(let i=0;i<40;i++){
createHeart();
}

}

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(heart);

}

</script>

</body>
</html>
