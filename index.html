<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cho anh cơ hội nhé</title>

<style>

body{
background:#ffe6f0;
font-family:Arial;
text-align:center;
padding-top:120px;
}

h1{
color:#ff4d88;
}

button{
font-size:18px;
padding:12px 25px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
}

#yesBtn{
background:#ff4d88;
color:white;
}

#noBtn{
background:#cccccc;
}

.heart{
position:fixed;
font-size:20px;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{top:-10%;}
100%{top:110%;}
}

</style>
</head>

<body>

<h1>Em đồng ý cho anh một cơ hội nhé ❤️</h1>

<button id="yesBtn" onclick="accept()">Đồng ý</button>
<button id="noBtn" onclick="changeNo()">Không</button>

<audio id="music" src="music.mp3"></audio>

<script>

let texts = [
"Không",
"Anh thử lại đi 😝",
"Em chắc chưa",
"Bấm lại xem",
"Đừng bấm nữa 😭",
"Thôi đồng ý đi ❤️"
];

let i = 0;
let size = 18;

function changeNo(){

i++;
size += 10;

let noBtn = document.getElementById("noBtn");

if(i < texts.length){
noBtn.innerText = texts[i];
}else{
noBtn.innerText = "Đồng ý đi mà ❤️";
}

noBtn.style.fontSize = size + "px";
noBtn.style.padding = (size/2) + "px " + size + "px";

}

function accept(){

document.getElementById("music").play();

for(let i=0;i<30;i++){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},3000);

}

alert("Anh biết mà ❤️");

}

</script>

</body>
</html>
