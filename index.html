<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi người anh thương ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffd6e7, #ffe9f3);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            overflow: hidden;
            margin: 0;
            touch-action: manipulation;
        }

        #content {
            background: rgba(255, 255, 255, 0.4);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 80%;
        }

        h1 { color: #ff4d88; font-size: 26px; line-height: 1.4; margin-bottom: 25px; }

        .sticker { font-size: 70px; margin-bottom: 20px; }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .yes { background: #ff4d88; color: white; margin-right: 10px; }
        .yes:active { transform: scale(0.9); }

        .no { background: white; color: #ff4d88; }

        .heart {
            position: absolute;
            font-size: 20px;
            animation: fall linear forwards;
            user-select: none;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body onclick="wakeUpMusic()">

    <div id="content">
        <div class="sticker">🥺❤️✨</div>
        <h1 id="mainTitle">Em đồng ý cho anh một cơ hội nhé ❤️</h1>
        <div class="btn-group">
            <button class="yes" id="yesBtn" onclick="accept()">Đồng ý</button>
            <button class="no" id="noBtn" onclick="changeNo()">Không</button>
        </div>
    </div>

    <audio id="music" loop preload="auto">
        <source src="nhac-chuong-mot-doi-buitruonglinh.mp3" type="audio/mpeg">
    </audio>

    <script>
        let noTexts = [
            "Không", "Em chắc chưa? 🥺", "Suy nghĩ lại đi mà... 😭", 
            "Anh buồn đó 💔", "Đừng bấm nữa 😢", "Thôi mà đồng ý đi ❤️", 
            "Cho cục kẹo nè 🍭", "Yêu anh đi màaaa"
        ];
        let index = 0;
        let noSize = 18;
        let isMusicReady = false;

        function wakeUpMusic() {
            let music = document.getElementById("music");
            if (!isMusicReady) {
                music.play().then(() => {
                    music.pause();
                    isMusicReady = true;
                }).catch(() => {});
            }
        }

        function changeNo() {
            wakeUpMusic();
            let btn = document.getElementById("noBtn");
            let yesBtn = document.getElementById("yesBtn");

            index = (index + 1) % noTexts.length;
            btn.innerText = noTexts[index];
            
            noSize += 10;
            yesBtn.style.fontSize = noSize + "px";
            yesBtn.style.padding = (noSize/2) + "px " + (noSize) + "px";

            let x = Math.random() * (window.innerWidth - btn.offsetWidth - 20);
            let y = Math.random() * (window.innerHeight - btn.offsetHeight - 20);
            
            btn.style.position = "fixed";
            btn.style.left = Math.max(10, x) + "px";
            btn.style.top = Math.max(10, y) + "px";
        }

        function accept() {
            let music = document.getElementById("music");
            music.currentTime = 0;
            music.play();

            document.getElementById("content").innerHTML = `
                <div class="sticker">🥰💖✨</div>
                <h1 style="color: #ff4d88;">Anh biết mà 😆❤️</h1>
                <h2 style="color: #ff4d88;">Cảm ơn em thật nhiều!</h2>
            `;

            setInterval(createHeart, 200);
        }

        function createHeart() {
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
            const colors = ["#ff4d88", "#ff85a2", "#ffb3c1", "#ff0000"];
            heart.style.color = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }
    </script>
</body>
</html>
