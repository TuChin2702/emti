<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anh xin một cơ hội</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffd6e7, #ffe9f3);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            overflow: hidden;
            margin: 0;
        }
        h1 { color: #ff4d88; font-size: 30px; margin-bottom: 25px; padding: 0 20px; }
        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
        }
        .yes { background: #ff4d88; color: white; position: relative; z-index: 10; }
        .no { background: #ddd; color: #333; position: relative; z-index: 5; }
        .sticker { font-size: 60px; margin-bottom: 10px; }
        .heart {
            position: absolute;
            font-size: 25px;
            animation: fall linear forwards;
            user-select: none;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="content">
        <div class="sticker">🥺❤️✨</div>
        <h1>Em đồng ý cho anh một cơ hội nhé ❤️</h1>
        <button class="yes" onclick="accept()">Đồng ý</button>
        <button class="no" id="noBtn" onclick="changeNo()">Không</button>
    </div>

    <audio id="music" loop>
        <source src="nhac-chuong-mot-doi-buitruonglinh.mp3" type="audio/mpeg">
    </audio>

    <script>
        let noTexts = [
            "Không", "Em chắc chưa 🥺", "Suy nghĩ lại đi mà 😭", 
            "Anh buồn đó 💔", "Đừng bấm nữa 😢", "Thôi mà đồng ý đi ❤️", 
            "Cho cục kẹo nè 🍭", "Yêu anh đi màaaa"
        ];
        let index = 0;
        let noSize = 18;

        function changeNo() {
            let btn = document.getElementById("noBtn");
            index = (index + 1) % noTexts.length;
            btn.innerText = noTexts[index];
            
            // Tăng size nút Không
            noSize += 8;
            btn.style.fontSize = noSize + "px";

            // Nhảy ngẫu nhiên trong màn hình
            let x = Math.random() * (window.innerWidth - btn.offsetWidth);
            let y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.position = "fixed";
            btn.style.left = x + "px";
            btn.style.top = y + "px";
        }

        function accept() {
            let music = document.getElementById("music");
            music.play().catch(() => console.log("Trình duyệt chặn nhạc"));

            document.body.innerHTML = `
                <div class="sticker">🥰💖✨</div>
                <h1>Anh biết mà 😆❤️</h1>
                <h2 style="color: #ff4d88;">Cảm ơn em đã cho anh cơ hội 💕</h2>
            `;

            setInterval(createHeart, 200);
        }

        function createHeart() {
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
            
            const colors = ["#ff4d88", "#ff85a2", "#ffb3c1", "#ff0000"];
            heart.style.color = colors[Math.floor(Math.random() * colors.length)];
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }
    </script>
</body>
</html>
